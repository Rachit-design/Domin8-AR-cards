<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Domin8 — League of Rising Stars</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <script>
    // -------- video-cover: crops the video texture to fill the plane without stretching --------
    AFRAME.registerComponent('video-cover', {
      init: function () {
        const el = this.el;
        const apply = () => {
          const mesh = el.getObject3D('mesh');
          if (!mesh || !mesh.material || !mesh.material.map) return false;
          const tex = mesh.material.map;
          const video = tex.image;
          if (!video || !video.videoWidth) return false;
          const planeW = parseFloat(el.getAttribute('width'));
          const planeH = parseFloat(el.getAttribute('height'));
          const planeRatio = planeW / planeH;
          const vRatio = video.videoWidth / video.videoHeight;
          if (vRatio > planeRatio) {
            const crop = (1 - planeRatio / vRatio) / 2;
            tex.offset.set(crop, 0);
            tex.repeat.set(1 - 2 * crop, 1);
          } else {
            const crop = (1 - vRatio / planeRatio) / 2;
            tex.offset.set(0, crop);
            tex.repeat.set(1, 1 - 2 * crop);
          }
          tex.needsUpdate = true;
          return true;
        };
        const retry = () => { if (!apply()) setTimeout(retry, 120); };
        el.addEventListener('object3dset', retry);
        setTimeout(retry, 200);
      }
    });

    // -------- glow-quad: radial pink halo via a custom shader --------
    AFRAME.registerComponent('glow-quad', {
      schema: {
        color: { type: 'color', default: '#EF438B' },
        intensity: { type: 'number', default: 0.7 },
        falloff: { type: 'number', default: 2.0 }
      },
      init: function () {
        const geom = new THREE.PlaneGeometry(1, 1);
        const mat = new THREE.ShaderMaterial({
          uniforms: {
            uColor: { value: new THREE.Color(this.data.color) },
            uIntensity: { value: this.data.intensity },
            uFalloff: { value: this.data.falloff }
          },
          vertexShader:
            'varying vec2 vUv; void main(){ vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0); }',
          fragmentShader:
            'uniform vec3 uColor; uniform float uIntensity; uniform float uFalloff; varying vec2 vUv;' +
            'void main(){ vec2 c = vUv - 0.5; float d = length(c) * 2.0; float a = pow(1.0 - clamp(d,0.0,1.0), uFalloff) * uIntensity; gl_FragColor = vec4(uColor, a); }',
          transparent: true,
          depthWrite: false,
          blending: THREE.AdditiveBlending
        });
        const mesh = new THREE.Mesh(geom, mat);
        this.el.setObject3D('mesh', mesh);
      }
    });

    // -------- billboard-smooth: video always softly faces the camera --------
    AFRAME.registerComponent('billboard-smooth', {
      schema: { speed: { type: 'number', default: 0.08 } },
      init: function () {
        this.camPos = new THREE.Vector3();
        this.elPos = new THREE.Vector3();
        this.up = new THREE.Vector3(0, 1, 0);
        this.mat = new THREE.Matrix4();
        this.targetQuat = new THREE.Quaternion();
        this.parentQuat = new THREE.Quaternion();
      },
      tick: function () {
        const cam = this.el.sceneEl.camera;
        if (!cam) return;
        cam.getWorldPosition(this.camPos);
        this.el.object3D.getWorldPosition(this.elPos);
        this.mat.lookAt(this.camPos, this.elPos, this.up);
        this.targetQuat.setFromRotationMatrix(this.mat);
        if (this.el.object3D.parent) {
          this.el.object3D.parent.getWorldQuaternion(this.parentQuat);
          this.parentQuat.invert();
          this.targetQuat.premultiply(this.parentQuat);
        }
        this.el.object3D.quaternion.slerp(this.targetQuat, this.data.speed);
      }
    });

    // -------- float-bob: subtle vertical float for extra magic --------
    AFRAME.registerComponent('float-bob', {
      schema: { amp: { default: 0.005 }, speed: { default: 1.5 } },
      init: function () { this.t = 0; this.baseY = this.el.object3D.position.y; },
      tick: function (_, dt) {
        this.t += (dt || 16) / 1000;
        this.el.object3D.position.y = this.baseY + Math.sin(this.t * this.data.speed) * this.data.amp;
      }
    });

    // -------- hang-down: pivot's local -Y always points to world -Y (gravity).
    //         The chain+badge hang straight down regardless of how the card is tilted.
    //         Slerp gives smooth, natural easing — looks like real pendulum settling.
    AFRAME.registerComponent('hang-down', {
      schema: { smoothness: { default: 0.18 } },
      init: function () {
        this.worldDown   = new THREE.Vector3(0, -1, 0);
        this.localDown   = new THREE.Vector3();
        this.parentQuat  = new THREE.Quaternion();
        this.invParent   = new THREE.Quaternion();
        this.targetQuat  = new THREE.Quaternion();
        this.localYDown  = new THREE.Vector3(0, -1, 0);
      },
      tick: function () {
        const p = this.el.object3D.parent;
        if (!p) return;
        p.getWorldQuaternion(this.parentQuat);
        this.invParent.copy(this.parentQuat).invert();
        // world-down expressed in parent's local frame
        this.localDown.copy(this.worldDown).applyQuaternion(this.invParent);
        // build local rotation that maps local -Y to that direction
        this.targetQuat.setFromUnitVectors(this.localYDown, this.localDown);
        this.el.object3D.quaternion.slerp(this.targetQuat, this.data.smoothness);
      }
    });

    // -------- tame-pbr: tame metallic GLBs so base color + emissive show through.
    //         The Valorant badge materials are highly metallic — under simple lighting
    //         they reflect everything as flat silver. We force low metalness, higher
    //         roughness, and rank-tinted emissive so the badge reads as itself. --------
    AFRAME.registerComponent('tame-pbr', {
      schema: {
        emissive: { type: 'color', default: '#7B2BB0' },
        emissiveIntensity: { default: 0.35 },
        metalness: { default: 0.20 },
        roughness: { default: 0.55 }
      },
      init: function () {
        const self = this;
        this.el.addEventListener('model-loaded', () => {
          const root = self.el.getObject3D('mesh');
          if (!root) return;
          root.traverse((n) => {
            if (n.isMesh && n.material) {
              const mats = Array.isArray(n.material) ? n.material : [n.material];
              mats.forEach((m) => {
                if ('emissive' in m) {
                  m.emissive = new THREE.Color(self.data.emissive);
                  m.emissiveIntensity = self.data.emissiveIntensity;
                }
                if ('metalness' in m) m.metalness = self.data.metalness;
                if ('roughness' in m) m.roughness = self.data.roughness;
                m.side = THREE.DoubleSide;  // safety: render both faces so flips don't hide the badge
                m.needsUpdate = true;
              });
            }
          });
        });
      }
    });

    // -------- video-blend: video texture + smooth alpha vignette so the
    //         video merges into the card instead of having a hard rectangle edge.
    AFRAME.registerComponent('video-blend', {
      schema: {
        feather: { default: 0.32 }   // 0 = hard edge, 1 = fully faded everywhere
      },
      init: function () {
        const el = this.el;
        const feather = this.data.feather;
        const setup = () => {
          const mesh = el.getObject3D('mesh');
          if (!mesh || !mesh.material || !mesh.material.map) { setTimeout(setup, 120); return; }
          const videoTex = mesh.material.map;
          const video = videoTex.image;
          if (!video || !video.videoWidth) { setTimeout(setup, 120); return; }
          videoTex.minFilter = THREE.LinearFilter;
          videoTex.magFilter = THREE.LinearFilter;

          const planeW = parseFloat(el.getAttribute('width'));
          const planeH = parseFloat(el.getAttribute('height'));
          const planeRatio = planeW / planeH;
          const vRatio = video.videoWidth / video.videoHeight;
          // cover: scale UVs so video fills plane without stretching
          let sx = 1, sy = 1, ox = 0, oy = 0;
          if (vRatio > planeRatio) { sx = planeRatio / vRatio; ox = (1 - sx) / 2; }
          else                     { sy = vRatio / planeRatio; oy = (1 - sy) / 2; }

          const mat = new THREE.ShaderMaterial({
            uniforms: {
              uMap:     { value: videoTex },
              uFeather: { value: feather },
              uScale:   { value: new THREE.Vector2(sx, sy) },
              uOffset:  { value: new THREE.Vector2(ox, oy) }
            },
            vertexShader:
              'varying vec2 vUv; void main(){ vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0); }',
            fragmentShader:
              'uniform sampler2D uMap; uniform float uFeather; uniform vec2 uScale; uniform vec2 uOffset;' +
              'varying vec2 vUv;' +
              'void main(){' +
              '  vec2 vidUv = vUv * uScale + uOffset;' +
              '  vec4 c = texture2D(uMap, vidUv);' +
              '  vec2 d = abs(vUv - 0.5) * 2.0;' +   // 0 at center, 1 at edges
              '  float maxD = max(d.x, d.y);' +
              '  float edge = smoothstep(1.0, 1.0 - uFeather, maxD);' +
              '  gl_FragColor = vec4(c.rgb, edge);' +
              '}',
            transparent: true,
            depthWrite: false,
            side: THREE.DoubleSide
          });
          mesh.material = mat;
        };
        el.addEventListener('object3dset', setup);
        setTimeout(setup, 200);
      }
    });
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }

    .overlay {
      position: fixed; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; color: #fff; padding: 24px;
      text-align: center; background: #0a0a0a; z-index: 1000;
    }
    #landing .brand { width:64px; height:64px; border-radius:12px;
      background: linear-gradient(135deg, #1A2193, #CE006D);
      display:flex; align-items:center; justify-content:center;
      font-weight:800; font-size:22px; color:#fff; margin-bottom:32px; }
    #landing h1 { font-size: 22px; margin-bottom: 6px; color: #EF438B; letter-spacing: 2px; text-transform: uppercase; }
    #landing h2 { font-size: 14px; color: #CE006D; font-style: italic; letter-spacing: 1px; margin-bottom: 24px; }
    #landing p { font-size: 14px; line-height: 1.6; color: #999; max-width: 300px; }
    #error h1 { color: #EF438B; font-size: 20px; margin-bottom: 12px; }
    #error p { font-size: 14px; color: #999; max-width: 320px; }
    #scan-hint {
      position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.8); color: #fff; padding: 12px 24px; border-radius: 24px;
      font-size: 14px; z-index: 50; backdrop-filter: blur(12px);
      border: 1px solid rgba(239,67,139,0.3); display: none;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }
  </style>
</head>
<body>

<div id="landing" class="overlay" style="display:none;">
  <div class="brand">D8</div>
  <h1>League of Rising Stars</h1>
  <h2>Ascension</h2>
  <p>Scan the QR code on the back of a Domin8 gamer card to activate the AR experience.</p>
</div>

<div id="error" class="overlay" style="display:none;">
  <h1>Card not found</h1>
  <p id="error-msg"></p>
</div>

<div id="scan-hint">Point your camera at the card front</div>

<!-- AR SCENE -->
<a-scene id="ar-scene" style="display:none;"
  mindar-image="imageTargetSrc: ./targets/targets.mind; uiScanning: no; uiLoading: no; uiError: no;"
  color-space="sRGB"
  renderer="colorManagement: true, physicallyCorrectLights"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false">

  <a-assets>
    <video id="cardVideo" src="./videos/mamanotjoe.mp4"
           preload="auto" loop muted playsinline webkit-playsinline
           crossorigin="anonymous"></video>
  </a-assets>

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <a-entity mindar-image-target="targetIndex: 0">

    <!-- MAIN VIDEO — large plane so the SOLID area covers the entire card.
         feather controls how far in from each edge the fade starts. -->
    <a-video src="#cardVideo"
             position="0 0.05 0.002"
             width="1.05" height="1.30"
             video-blend="feather: 0.28"></a-video>

    <!-- HANGING RANK BADGE — anchored at top-right corner of the card.
         The badge-anchor sits at the hole, the chain hangs down, the badge
         dangles below. hang-down keeps the chain pointing to world-down
         (gravity) regardless of card tilt. -->
    <a-entity id="badge-anchor" position="0.34 0.48 0.018">
      <a-entity hang-down="smoothness: 0.18">
        <!-- chain -->
        <a-cylinder height="0.10" radius="0.0025"
                    position="0 -0.05 0"
                    color="#dddddd"
                    material="metalness: 0.8; roughness: 0.3; shader: standard"></a-cylinder>
        <!-- loop where chain meets badge -->
        <a-torus radius="0.010" radius-tubular="0.0024"
                 position="0 -0.105 0"
                 rotation="90 0 0"
                 color="#dddddd"
                 material="metalness: 0.8; roughness: 0.3"></a-torus>
        <!-- rank badge GLB (rank-tinted emissive set per player below).
             rotation flips the badge so the textured/colored side faces the camera. -->
        <a-gltf-model id="rank-badge"
                      src="./models/ranks/immortal.glb"
                      position="0 -0.17 0"
                      rotation="0 180 0"
                      scale="4 4 4"
                      tame-pbr="emissive: #7B2BB0; emissiveIntensity: 0.4; metalness: 0.18; roughness: 0.55"></a-gltf-model>
      </a-entity>
    </a-entity>
  </a-entity>

  <!-- lights at SCENE level (not inside target) so they always exist -->
  <a-light type="ambient" color="#ffffff" intensity="1.0"></a-light>
  <a-light type="directional" color="#ffffff" intensity="1.2" position="0 1 1"></a-light>
</a-scene>

<script>
  // -----------------------------------------------------------------
  // PLAYER REGISTRY
  // To add a new player:
  //   1. Drop their card-front PNG, recompile targets.mind, note the targetIndex
  //   2. Drop their video into ./videos/<key>.mp4
  //   3. Add an entry here with their key (URL param), targetIndex, and rank
  // -----------------------------------------------------------------
  const PLAYERS = {
    "mamanotjoe": { targetIndex: 0, video: "./videos/mamanotjoe.mp4", rank: "immortal", name: "MAMANOTJOE" }
    // "ghostwire":  { targetIndex: 1, video: "./videos/ghostwire.mp4",  rank: "diamond",   name: "GHOSTWIRE" },
    // "tag":        { targetIndex: 2, video: "./videos/tag.mp4",        rank: "ascendant", name: "TAG" },
    // ...
  };

  // RANK TINT — emissive color + intensity per Valorant tier so each badge reads correctly
  const RANK_TINT = {
    iron:      { emissive: '#7A7A7A', intensity: 0.25 },
    bronze:    { emissive: '#A66B3B', intensity: 0.30 },
    silver:    { emissive: '#B8B8B8', intensity: 0.30 },
    gold:      { emissive: '#D4A82A', intensity: 0.40 },
    platinum:  { emissive: '#3FB3B0', intensity: 0.35 },
    diamond:   { emissive: '#9B5BD9', intensity: 0.40 },
    ascendant: { emissive: '#3FAF7F', intensity: 0.40 },
    immortal:  { emissive: '#B6324B', intensity: 0.45 },
    radiant:   { emissive: '#F0E4A3', intensity: 0.55 }
  };

  const params = new URLSearchParams(window.location.search);
  const playerKey = params.get("p");
  const scene = document.getElementById("ar-scene");
  const landing = document.getElementById("landing");
  const error = document.getElementById("error");
  const errMsg = document.getElementById("error-msg");
  const hint = document.getElementById("scan-hint");

  if (!playerKey) {
    landing.style.display = "flex";
  } else if (!PLAYERS[playerKey]) {
    error.style.display = "flex";
    errMsg.textContent = `No player registered for code "${playerKey}". Check the QR link.`;
  } else {
    const player = PLAYERS[playerKey];
    document.getElementById("cardVideo").setAttribute("src", player.video);
    document.querySelector("[mindar-image-target]").setAttribute("mindar-image-target", "targetIndex: " + player.targetIndex);
    if (player.rank) {
      const badge = document.getElementById("rank-badge");
      badge.setAttribute("src", "./models/ranks/" + player.rank + ".glb");
      const tint = RANK_TINT[player.rank];
      if (tint) {
        badge.setAttribute("tame-pbr",
          "emissive: " + tint.emissive +
          "; emissiveIntensity: " + tint.intensity +
          "; metalness: 0.18; roughness: 0.55");
      }
    }
    scene.style.display = "block";

    scene.addEventListener("loaded", () => {
      hint.style.display = "block";
      const target = document.querySelector("[mindar-image-target]");
      const video = document.getElementById("cardVideo");
      target.addEventListener("targetFound", () => {
        hint.style.display = "none";
        video.play().catch(() => {});
      });
      target.addEventListener("targetLost", () => {
        hint.style.display = "block";
        video.pause();
      });
    });
  }
</script>
</body>
</html>
